services:

  # ── Directus ────────────────────────────────────────────────────────────────
  momentum-directus:
    image: directus/directus:11
    restart: unless-stopped
    container_name: momentum-directus
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      # Sécurité
      SECRET: ${SECRET}
      ACCESS_TOKEN_TTL: "15m"
      REFRESH_TOKEN_TTL: "7d"
      REFRESH_TOKEN_COOKIE_SECURE: "true"
      REFRESH_TOKEN_COOKIE_SAME_SITE: "strict"

      # Base de données
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # Rate limiting en mémoire
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: "memory"
      RATE_LIMITER_POINTS: "50"
      RATE_LIMITER_DURATION: "1"

      # CORS — restreindre à ton domaine front
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${CORS_ORIGIN}
      CORS_METHODS: "GET,POST,PATCH,DELETE"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"

      # Application
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Désactiver la télémétrie
      TELEMETRY: "false"

      # Logs réduits en prod
      LOG_LEVEL: "warn"

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - internal

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal           # jamais exposé vers l'extérieur

  # ── Backup ───────────────────────────────────────────────────────────────────
  backup:
    build: ./backup
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - BACKUP_BUCKET=${BACKUP_BUCKET}
      - RCLONE_CONFIG_B2BACKUP_TYPE=b2
      - RCLONE_CONFIG_B2BACKUP_ACCOUNT=${B2_ACCOUNT_ID}
      - RCLONE_CONFIG_B2BACKUP_KEY=${B2_APPLICATION_KEY}
      - TZ=Europe/Paris
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy

# ── Réseaux ──────────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true
  internal:
    internal: true

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
