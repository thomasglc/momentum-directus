services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus_local
    volumes:
      - postgres_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 5s
      retries: 10
      start_period: 30s

  directus:
    image: directus/directus:latest
    ports:
      - "8056:8055"
    environment:
      SECRET: "latronspem-momentum"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: "directus_local"
      ADMIN_EMAIL: "thomas.galocha@hotmail.fr"
      ADMIN_PASSWORD: "thomas67"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
      - ./database:/directus/database
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_local: